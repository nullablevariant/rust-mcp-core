version: 1
server:
  host: 127.0.0.1
  port: 31943
  endpoint_path: /mcp
  logging:
    level: info
  transport:
    mode: streamable_http
  auth:
    enabled: false

client_logging:
  level: info

progress:
  enabled: false
  notification_interval_ms: 250

resources:
  notify_list_changed: true
  clients_can_subscribe: true
  providers:
    - type: inline
      items:
        - uri: resource://docs/terms
          name: terms
          title: Terms
          mime_type: text/markdown
          content:
            text: "# Terms"
      templates:
        - uri_template: resource://docs/{path}
          name: docs-template
          arguments_schema:
            type: object
            properties:
              path: { type: string }
            required: [path]
          completions:
            path: fs_paths

    - type: plugin
      plugin: resource.plugin
      config:
        root: /srv/docs
      templates:
        - uri_template: resource://repo/{path}
          name: repo-template
          arguments_schema:
            type: object
            properties:
              path: { type: string }
            required: [path]
          completions:
            path: fs_paths

completion:
  enabled: true
  providers:
    - name: fs_paths
      type: inline
      values: ["docs/terms", "docs/getting-started", "repo/readme.md"]

plugins:
  - name: resource.plugin
    type: resource
    config:
      region: us
