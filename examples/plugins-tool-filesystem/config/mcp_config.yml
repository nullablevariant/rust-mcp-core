version: 1
server:
  host: 0.0.0.0
  port: 31943
  endpoint_path: /mcp
  logging:
    level: info
  transport:
    mode: streamable_http
  auth:
    enabled: false

plugins:
  - name: fs.read
    type: tool
  - name: fs.write
    type: tool
  - name: fs.delete
    type: tool

tools:
  items:
    - name: fs.read
      description: Read a file
      input_schema:
        type: object
        properties:
          path: { type: string }
        required: [path]
      execute:
        type: plugin
        plugin: fs.read
        config:
          root: "/data"
          allow_symlinks: false
      response:
        type: structured
        template:
          data: ${$}
        fallback: text

    - name: fs.write
      description: Write a file
      input_schema:
        type: object
        properties:
          path: { type: string }
          content: { type: string }
        required: [path, content]
      execute:
        type: plugin
        plugin: fs.write
        config:
          root: "/data"
          create_dirs: true

    - name: fs.delete
      description: Delete a file
      input_schema:
        type: object
        properties:
          path: { type: string }
        required: [path]
      execute:
        type: plugin
        plugin: fs.delete
        config:
          root: "/data"
          allow_delete: false
