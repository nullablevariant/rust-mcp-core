version: 1
server:
  host: 0.0.0.0
  port: 31943
  endpoint_path: /mcp
  logging:
    level: info
  transport:
    mode: streamable_http
  auth:
    enabled: false

upstreams:
  api:
    base_url: ${env:API_BASE_URL}

tools:
  items:
    - name: tickets.create
      description: Create a ticket
      input_schema:
        type: object
        properties:
          title: { type: string }
          description: { type: string }
          labels: { type: array, items: { type: string } }
        required: [title]
      execute:
        type: http
        upstream: api
        method: POST
        path: /tickets
        body:
          title: ${title}
          description: ${description?}
          labels: ${labels?}
      response:
        type: structured
        template:
          data: ${$}
        fallback: text
