version: 1
server:
  host: 0.0.0.0
  port: 31943
  endpoint_path: /mcp
  logging:
    level: info
  transport:
    mode: streamable_http
  auth:
    enabled: false

upstreams:
  api:
    base_url: ${env:API_BASE_URL}

tools:
  items:
    - name: search.advanced
      description: Advanced search
      input_schema:
        type: object
        properties:
          query: { type: string }
          tags: { type: array, items: { type: string } }
          page: { type: integer }
          per_page: { type: integer }
        required: [query]
      execute:
        type: http
        upstream: api
        method: GET
        path: /search
        query:
          q: ${query}
          tags: ${tags|csv?}
          page: ${page|default(1)}
          per_page: ${per_page|default(25)}
      response:
        type: structured
        template:
          data: ${$}
        fallback: text
